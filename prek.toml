[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "check-toml" },
    { id = "end-of-file-fixer" },
    { id = "check-added-large-files" },
]

[[repos]]
repo = "https://github.com/crate-ci/typos"
rev = "v1.44.0"
hooks = [
    { id = "typos" },
]

[[repos]]
repo = "local"
hooks = [
    { id = "gitleaks", name = "gitleaks", entry = "gitleaks git --staged --redact --no-banner", language = "system", always_run = true, pass_filenames = false },
    { id = "cargo-fmt", name = "cargo fmt", entry = "cargo fmt -- --check", language = "system", types = ["rust"], pass_filenames = false },
    { id = "similarity-fn", name = "similarity (functions)", entry = "sh -c '$HOME/.cargo/bin/similarity-rs crates/ --skip-test --threshold 0.96 --exclude benches --fail-on-duplicates'", language = "system", types = ["rust"], pass_filenames = false },
    { id = "similarity-types", name = "similarity (types)", entry = "sh -c '$HOME/.cargo/bin/similarity-rs crates/ --skip-test --experimental-types --no-functions --threshold 0.95 --fail-on-duplicates'", language = "system", types = ["rust"], pass_filenames = false },
    { id = "cargo-machete", name = "unused deps", entry = "cargo machete", language = "system", types = ["rust"], pass_filenames = false },
    { id = "cargo-clippy", name = "cargo clippy", entry = "cargo clippy --workspace --all-targets -- -D warnings", language = "system", types = ["rust"], pass_filenames = false, stages = ["pre-push"] },
    { id = "cargo-nextest", name = "cargo nextest", entry = "cargo nextest run --workspace", language = "system", types = ["rust"], pass_filenames = false, stages = ["pre-push"] },
    { id = "cargo-doc", name = "cargo doc", entry = "sh -c 'RUSTDOCFLAGS=\"-D warnings\" cargo doc --workspace --no-deps'", language = "system", types = ["rust"], pass_filenames = false, stages = ["pre-push"] },
    { id = "commit-msg-check", name = "conventional commits + english", entry = "scripts/check-commit-msg.sh", language = "system", always_run = true, pass_filenames = false, stages = ["commit-msg"] },
]
