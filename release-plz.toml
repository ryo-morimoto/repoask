[workspace]
release_commits = "^(feat|fix|refactor|perf|docs|test|chore)(\\(.+\\))?!?:"
dependencies_update = true
semver_check = true
publish_timeout = "10m"
pr_labels = ["release"]
pr_draft = false
git_release_enable = true
changelog_update = true

[changelog]
protect_breaking_commits = true
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits -%}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif -%}
          {% if commit.breaking %}[**breaking**] {% endif -%}
          {{ commit.message | split(pat="\n") | first | upper_first | trim }}
          {%- if commit.remote.username %} by @{{ commit.remote.username }}{%- endif %}
    {% endfor %}
{% endfor %}
"""
trim = true

commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^docs", group = "Documentation" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps\\)", group = "Dependencies" },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^ci", group = "CI" },
    { message = "^build", group = "Build" },
]

# All publishable crates share one version
[[package]]
name = "repoask-core"
version_group = "repoask"

[[package]]
name = "repoask-parser"
version_group = "repoask"

[[package]]
name = "repoask-treesitter"
version_group = "repoask"

[[package]]
name = "repoask-repo"
version_group = "repoask"

[[package]]
name = "repoask"
version_group = "repoask"
semver_check = false
changelog_include = ["repoask-core", "repoask-parser", "repoask-treesitter", "repoask-repo"]

[[package]]
name = "repoask-wasm"
publish = false
release = false
