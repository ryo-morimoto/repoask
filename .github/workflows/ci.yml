name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

# Default: no permissions. Override per-job.
permissions: {}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      rust_changed: ${{ steps.classify.outputs.rust_changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "rust_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only "${{ github.event.pull_request.base.sha }}...HEAD" > changed.txt

          if [ ! -s changed.txt ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "rust_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if rg -q -v '^(docs/|.*\.md$|LICENSE(\..*)?$)' changed.txt; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          fi

          if rg -q '^(cli/|crates/|wasm/|\.cargo/)|(^|/)(Cargo\.toml|Cargo\.lock|deny\.toml|clippy\.toml)$' changed.txt; then
            echo "rust_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust_changed=false" >> "$GITHUB_OUTPUT"
          fi

  typos:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Typos
        uses: crate-ci/typos@5374cbf686e897b15713110e233094e2874de7ef # v1.29.10

  # Gate 1: Fast checks (< 1 min)
  check:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.rust_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad # v2
        with:
          tool: cargo-shear@1.11.2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Doc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
      - name: Dependency hygiene
        run: cargo shear

  # Gate 2: Secret scanning
  secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  # Gate 3: SAST
  sast:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad # v2
        with:
          tool: just
      - name: Install Semgrep
        run: |
          python3 -m pip install --user --disable-pip-version-check semgrep==1.152.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Semgrep
        run: just semgrep-sarif
      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-report
          path: semgrep.sarif

  # Gate 4a: Tests (Ubuntu on PR/main/schedule)
  test-ubuntu:
    needs: [changes, check]
    if: needs.check.result == 'success' && (github.event_name != 'pull_request' || needs.changes.outputs.rust_changed == 'true')
    name: test (ubuntu-latest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad # v2
        with:
          tool: nextest,cargo-insta
      - name: Tests
        run: cargo nextest run --workspace --profile ci
      - name: Doc tests
        run: cargo test --workspace --doc
      - name: Snapshot check
        run: cargo insta test --workspace --unreferenced reject
        env:
          CI: "1"

  # Gate 4b: macOS compatibility (main + nightly only)
  test-macos:
    needs: [check]
    if: needs.check.result == 'success' && github.event_name != 'pull_request'
    name: test (macos-latest)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad # v2
        with:
          tool: nextest,cargo-insta
      - name: Tests
        run: cargo nextest run --workspace --profile ci
      - name: Doc tests
        run: cargo test --workspace --doc
      - name: Snapshot check
        run: cargo insta test --workspace --unreferenced reject
        env:
          CI: "1"

  # Gate 5: Dead code / unused dependency detection
  udeps:
    needs: [changes, check]
    if: needs.check.result == 'success' && (github.event_name != 'pull_request' || needs.changes.outputs.rust_changed == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RUSTC_WRAPPER: ""
      SCCACHE_GHA_ENABLED: "false"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad # v2
        with:
          tool: cargo-udeps@0.1.60
      - name: Unused dependencies
        run: cargo +nightly udeps --workspace --all-targets --all-features

  # Gate 6: Dependency audit
  audit:
    needs: [changes, check]
    if: needs.check.result == 'success' && (github.event_name != 'pull_request' || needs.changes.outputs.rust_changed == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RUSTC_WRAPPER: ""
      SCCACHE_GHA_ENABLED: "false"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad # v2
        with:
          tool: cargo-deny@0.19.0
      - name: Dependency audit
        run: cargo deny check

  # Gate 7: Coverage
  coverage:
    needs: [changes, check]
    if: needs.check.result == 'success' && (github.event_name != 'pull_request' || needs.changes.outputs.rust_changed == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad # v2
        with:
          tool: cargo-llvm-cov,nextest
      - name: Coverage
        run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info
      - name: Coverage ratchet
        run: scripts/check-coverage-ratchet.sh lcov.info .metrics/coverage-baseline
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v4.0.1
        with:
          files: lcov.info
          fail_ci_if_error: false

  # Gate 8: Mutation testing (PR diff only)
  mutants:
    needs: [changes, check]
    if: github.event_name == 'pull_request' && needs.check.result == 'success' && needs.changes.outputs.rust_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad # v2
        with:
          tool: nextest,cargo-mutants
      - name: Generate PR diff for cargo-mutants
        run: git diff --binary --unified=0 "${{ github.event.pull_request.base.sha }}...HEAD" > pr.diff
      - name: Mutation testing (PR diff)
        run: cargo mutants --in-diff pr.diff --test-tool nextest --timeout 120
      - name: Upload mutants report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutants-report
          path: mutants.out/
