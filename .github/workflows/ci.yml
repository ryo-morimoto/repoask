name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default: no permissions. Override per-job.
permissions: {}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  # Gate 1: Fast checks (< 1 min)
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Doc
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
      - name: Dependency hygiene
        run: |
          cargo install cargo-shear --locked
          cargo shear
      - name: Typos
        uses: crate-ci/typos@02ea592e44b3a53c302f697cddca7641cd051c3d # v1.29.10

  # Gate 2: Secret scanning
  secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  # Gate 3: SAST
  sast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2
        with:
          tool: just
      - name: Install Semgrep
        run: |
          python3 -m pip install --user --disable-pip-version-check semgrep==1.152.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Semgrep
        run: just semgrep-sarif
      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: semgrep-report
          path: semgrep.sarif

  # Gate 4: Tests (OS matrix)
  test:
    needs: check
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2
        with:
          tool: nextest,cargo-insta
      - name: Tests
        run: cargo nextest run --workspace --profile ci
      - name: Doc tests
        run: cargo test --workspace --doc
      - name: Snapshot check
        run: cargo insta test --workspace --unreferenced reject
        env:
          CI: "1"

  # Gate 5: Dead code / unused dependency detection
  udeps:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RUSTC_WRAPPER: ""
      SCCACHE_GHA_ENABLED: "false"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked
      - name: Unused dependencies
        run: cargo +nightly udeps --workspace --all-targets --all-features

  # Gate 6: Dependency audit
  audit:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RUSTC_WRAPPER: ""
      SCCACHE_GHA_ENABLED: "false"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2.0.15

  # Gate 7: Coverage
  coverage:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2
        with:
          tool: cargo-llvm-cov,nextest
      - name: Coverage
        run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info
      - name: Coverage ratchet
        run: scripts/check-coverage-ratchet.sh lcov.info .metrics/coverage-baseline
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v4.0.1
        with:
          files: lcov.info
          fail_ci_if_error: false

  # Gate 8: Mutation testing (PR diff only)
  mutants:
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2
        with:
          tool: nextest,cargo-mutants
      - name: Mutation testing (PR diff)
        run: cargo mutants --in-diff origin/${{ github.base_ref }}...HEAD --test-tool nextest --timeout 120
      - name: Upload mutants report
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mutants-report
          path: mutants.out/
